name: Build And Push MusicTV Unity Project to Steam Beta

on:
    push:
        branches:
            - main
        paths:
            - "MusicTV/SongQuiz/**"
            - ".github/workflows/build-push-musictv-beta.yml"
    workflow_dispatch:

permissions:
    contents: read

env:
    STEAM_APP_ID: "1315390"

jobs:
    buildForSteam:
        name: Build for ${{ matrix.targetPlatform }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                targetPlatform:
                    - StandaloneWindows64
                    - StandaloneLinux64
                    - StandaloneOSX

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  lfs: true

            - name: Cache Unity Library
              uses: actions/cache@v4
              with:
                  path: MusicTV/SongQuiz/Library
                  key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('MusicTV/SongQuiz/Assets/**', 'MusicTV/SongQuiz/Packages/**', 'MusicTV/SongQuiz/ProjectSettings/**') }}
                  restore-keys: |
                      Library-${{ matrix.targetPlatform }}-
                      Library-

            - name: Build Unity project
              uses: game-ci/unity-builder@v4
              env:
                  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
                  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
                  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
              with:
                  projectPath: MusicTV/SongQuiz
                  targetPlatform: ${{ matrix.targetPlatform }}
                  unityVersion: auto

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: Build-${{ matrix.targetPlatform }}
                  path: build/${{ matrix.targetPlatform }}

    deployToSteam:
        name: Deploy to Steam Beta
        needs: buildForSteam
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download StandaloneWindows64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: Build-StandaloneWindows64
                  path: build/StandaloneWindows64

            - name: Download StandaloneLinux64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: Build-StandaloneLinux64
                  path: build/StandaloneLinux64

            - name: Download StandaloneOSX artifact
              uses: actions/download-artifact@v4
              with:
                  name: Build-StandaloneOSX
                  path: build/StandaloneOSX

            - name: Deploy build to Steam Beta
              uses: game-ci/steam-deploy@v3
              with:
                  username: ${{ secrets.STEAM_USERNAME }}
                  configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
                  appId: ${{ env.STEAM_APP_ID }}
                  buildDescription: Beta build ${{ github.run_number }} (${{ github.sha }})
                  rootPath: build
                  depot1Path: StandaloneWindows64
                  depot8Path: StandaloneLinux64
                  depot9Path: StandaloneOSX
                  releaseBranch: beta
